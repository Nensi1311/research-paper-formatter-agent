spec_version: 1
name: scholar-env
type: space
runtime: fastapi
app: server.app:app
port: 7860

# v6 — five tasks (T5 added in Phase C3)
tasks:
  - id: formatting_compliance
    description: Reformat a manuscript to IEEE style (PRS, 3-stage)
  - id: internal_consistency
    description: Find numerical contradictions across sections
  - id: claim_evidence_audit
    description: Find text-vs-table claim mismatches (the core RL contribution)
  - id: citation_verification
    description: Identify ghost / misattributed / retracted references
  - id: prompt_injection_audit
    description: Catch hidden adversarial directives planted in any section (zero-shot transfer target)

authors:
  - Nensi Pansuriya
  - Krushna Parmar
  - Ishita Bhojani

baseline_script: inference.py
