name: scholar-env
version: "0.3.0"
description: >
  ScholarEnv is an OpenEnv environment simulating the scholarly publishing
  integrity pipeline. An AI agent acts as a research integrity auditor,
  progressing from formatting compliance through internal consistency checking
  to full claim-evidence auditing — the first RL environment for automated
  peer review. Task 3 scores 0.20–0.45 for frontier models, providing a genuine
  training signal that prompting alone cannot achieve.

domain: academic_publishing
license: Apache-2.0

tags:
  - openenv
  - nlp
  - document-understanding
  - research-integrity
  - peer-review
  - academic
  - rl-environment

tasks:
  - id: formatting_compliance
    name: "Manuscript Formatting Compliance"
    description: >
      Reformat a badly-formatted manuscript to meet IEEE style requirements.
      Fix: title (≤15 words), abstract (150–250 words, no citations), section
      order, figure/table captions, in-text citations, keywords, author block.
    difficulty: easy
    interaction_type: single_shot
    max_steps: 3
    expected_frontier_score: "0.80-0.95"
    success_threshold: 0.80

  - id: internal_consistency
    name: "Internal Consistency Verification"
    description: >
      Identify internal contradictions in a research paper — number mismatches
      between sections, references to nonexistent figures/tables, inconsistent
      contribution counts, unresolved placeholders. Navigate with query_section,
      then submit findings. F-beta reward (beta=0.5) penalises hallucinated findings.
    difficulty: medium
    interaction_type: multi_step
    max_steps: 4
    expected_frontier_score: "0.40-0.65"
    success_threshold: 0.50

  - id: claim_evidence_audit
    name: "Claim–Evidence Discrepancy Audit"
    description: >
      Audit whether numerical claims in the paper text match the values in
      referenced tables/figures. Injected discrepancies must be found via
      strategic multi-step navigation (query_section, check_table,
      extract_claims). Traversal order matters — RL discovers the optimal
      strategy. PBRS provides dense intermediate rewards.
    difficulty: hard
    interaction_type: multi_step
    max_steps: 6
    expected_frontier_score: "0.20-0.45"
    success_threshold: 0.35

action_space:
  type: structured
  description: >
    Task 1 (formatting_compliance): FormattingAction — submit the full
    reformatted manuscript text.
    Tasks 2/3 (scholar tasks): ScholarAction — navigate with query_section,
    check_table, extract_claims; finalise with submit_findings.
  discriminator_field: task

observation_space:
  type: structured
  fields:
    - name: task_id
      type: string
    - name: task_description
      type: string
    - name: paper_id
      type: string
    - name: manuscript_text
      type: string
      note: "Task 1 initial observation only"
    - name: style_guide
      type: object
      note: "Task 1 only — IEEE rule config"
    - name: available_sections
      type: array
      note: "Tasks 2/3 — queryable section names"
    - name: available_tables
      type: array
    - name: current_section_content
      type: string
      note: "Returned after query_section"
    - name: current_table_content
      type: object
      note: "Returned after check_table"
    - name: extracted_claims
      type: array
      note: "Returned after extract_claims"
    - name: findings_so_far
      type: array
    - name: step_count
      type: integer
    - name: max_steps
      type: integer
    - name: feedback
      type: string
    - name: hint
      type: string
    - name: cumulative_score
      type: float

reward:
  type: continuous
  range: [0.0, 1.0]
  description: >
    Task 1: Progressive Reward Shaping (PRS) — 3 stages unlock sequentially.
    Tasks 2/3: F-beta (beta=0.5, precision-biased) against pre-annotated
    ground truth + PBRS intermediate shaping bonuses + coverage bonus.

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  health: GET /health
  action_space: GET /action_space
  tasks: GET /tasks

docker:
  build: docker build -t scholar-env .
  run: docker run -p 7860:7860 scholar-env

huggingface:
  space: scholar-env
  sdk: docker
  tags:
    - openenv
    - research-integrity
    - rl-environment
